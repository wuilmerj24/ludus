name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2 \
            protobuf-compiler \
            libdrm-dev 

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build release binary
        run: cargo build --release

      - name: Build packages (deb y AppImage)
        run: cargo packager --release

      - name: Create .tar.gz
        run: |
          # Crear carpeta para el tar
          mkdir -p target/release/bundle/tar
          # Crear el tar.gz con el binario
          cd target/release
          tar -czf ludus-${{ github.ref_name }}.tar.gz ludus
          mv ludus-${{ github.ref_name }}.tar.gz bundle/tar/

      - name: Debug - Show all generated files
        run: |
          echo "=== TODOS LOS ARCHIVOS GENERADOS ==="
          find target/release -type f | sort
          echo "=== ARCHIVOS .deb ==="
          find target/release -name "*.deb"
          echo "=== ARCHIVOS .AppImage ==="
          find target/release -name "*.AppImage"
          echo "=== ARCHIVOS .tar.gz ==="
          find target/release -name "*.tar.gz"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}
            
            ## Descargas:
            - 📦 .deb package (Debian/Ubuntu)
            - 📦 AppImage (Universal)
            - 📦 .tar.gz (Binary)
            
            ## Instalación:
            ```bash
            # Debian/Ubuntu
            sudo dpkg -i ludus_*.deb
            
            # AppImage (cualquier distribución)
            chmod +x ludus_*.AppImage
            ./ludus_*.AppImage
            
            # Tar.gz (cualquier sistema)
            tar -xzf ludus-*.tar.gz
            ./ludus
          files: |
            target/release//*.deb
            target/release//.AppImage
            target/release/**/.tar.gz