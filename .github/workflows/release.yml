name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2 \
            protobuf-compiler \
            libdrm-dev \
            libdrm-amdgpu-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build release binary
        run: cargo build --release

      - name: Build packages
        run: cargo packager --release --formats deb,rpm,appimage

      - name: Debug - Show all generated files
        run: |
          echo "=== TODOS LOS ARCHIVOS GENERADOS ==="
          find target/release/bundle -type f | sort
          echo "=== ARCHIVOS .deb ==="
          find target/release/bundle -name "*.deb"
          echo "=== ARCHIVOS .rpm ==="
          find target/release/bundle -name "*.rpm"
          echo "=== ARCHIVOS .AppImage ==="
          find target/release/bundle -name "*.AppImage"
          echo "=== ARCHIVOS .tar, .tar.gz, .tgz ==="
          find target/release/bundle -name "*.tar" -o -name "*.tar.gz" -o -name "*.tgz"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}
            
            ## Descargas:
            - 📦 .deb package
            - 📦 .rpm package
            - 📦 AppImage
          files: |
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            
            